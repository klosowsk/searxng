---
name: Build Custom Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'searx/**'
      - 'requirements*.txt'
      - 'container/**'
      - '.github/workflows/build-custom.yml'

concurrency:
  group: build-custom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          echo "sha_short=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build builder stage
        run: |
          docker buildx build \
            -f container/builder.dockerfile \
            -t localhost/searxng/searxng:builder \
            --no-cache \
            --load \
            .

      - name: Generate version_frozen.py
        run: |
          GIT_TAG=$(git describe --tags --always 2>/dev/null || echo "custom")
          cat > searx/version_frozen.py << EOF
          VERSION_STRING = "${GIT_TAG}+impersonate"
          VERSION_TAG = "${GIT_TAG}"
          DOCKER_TAG = "latest"
          GIT_URL = "https://github.com/${{ github.repository }}"
          GIT_BRANCH = "master"
          EOF
          sed -i 's/^          //' searx/version_frozen.py

      - name: Build dist image
        run: |
          docker buildx build \
            -f container/dist.dockerfile \
            --build-arg CONTAINER_IMAGE_ORGANIZATION=searxng \
            --build-arg CONTAINER_IMAGE_NAME=searxng \
            --build-arg CREATED=${{ steps.version.outputs.created }} \
            --build-arg VERSION=custom-impersonate \
            --build-arg VCS_URL=${{ github.server_url }}/${{ github.repository }} \
            --build-arg VCS_REVISION=${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha_short }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --load \
            .

      - name: Push to GHCR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha_short }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

---
name: Build Custom Image

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: build-custom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          echo "sha_short=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "version=$(python3 -c 'import searx.version; print(searx.version.VERSION_STRING)' 2>/dev/null || echo 'custom')" >> $GITHUB_OUTPUT

      - name: Build builder stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/builder.dockerfile
          load: true
          tags: localhost/searxng/searxng:builder
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

      - name: Build and push dist image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/dist.dockerfile
          push: true
          build-args: |
            CONTAINER_IMAGE_ORGANIZATION=searxng
            CONTAINER_IMAGE_NAME=searxng
            CREATED=${{ steps.version.outputs.created }}
            VERSION=${{ steps.version.outputs.version }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}
            VCS_REVISION=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=dist
          cache-to: type=gha,mode=max,scope=dist
